<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login / Sign Up - FoodTrippid PH</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand:'#FF6B00',brandDark:'#CC5500',brandLight:'#FF8C3A',
        surface:'#141414',card:'#1C1C1C',cardHover:'#242424',
        border:'#2A2A2A',muted:'#5A5A5A',subtle:'#3A3A3A',
        textPrimary:'#F0F0F0',textSecondary:'#9A9A9A',
      },
      fontFamily:{ display:['Syne','sans-serif'], body:['DM Sans','sans-serif'] }
    }
  }
}
</script>
<link rel="stylesheet" href="css/styles.css"/>
<style>
  /* Form tab switcher */
  .tab-btn {
    flex: 1;
    padding: 10px 0;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    border-radius: 12px;
    transition: all 0.25s;
    color: #5A5A5A;
    background: transparent;
    border: none;
    cursor: pointer;
  }
  .tab-btn.active { background: #FF6B00; color: white; }

  /* Form inputs */
  .auth-input {
    width: 100%;
    background: #1C1C1C;
    border: 1.5px solid #2A2A2A;
    color: #F0F0F0;
    border-radius: 14px;
    padding: 14px 16px 14px 46px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .auth-input:focus { border-color: #FF6B00; }
  .auth-input::placeholder { color: #5A5A5A; }
  .auth-input.no-icon { padding-left: 16px; }
  select.auth-input option { background: #1C1C1C; color: #F0F0F0; }
  select.auth-input option:disabled { color: #5A5A5A; }

  /* Input icon wrapper */
  .input-wrap { position: relative; }
  .input-icon {
    position: absolute; left: 16px; top: 50%;
    transform: translateY(-50%); color: #5A5A5A;
    font-size: 14px; pointer-events: none; transition: color 0.2s;
  }
  .input-wrap:focus-within .input-icon { color: #FF6B00; }
  .input-eye {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%); color: #5A5A5A;
    font-size: 14px; cursor: pointer;
    background: none; border: none; padding: 4px; transition: color 0.2s;
  }
  .input-eye:hover { color: #FF6B00; }

  /* Auth button */
  .auth-btn {
    width: 100%; background: #FF6B00; color: white; border: none;
    border-radius: 14px; padding: 15px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .auth-btn:hover { background: #FF7F1A; }
  .auth-btn:active { transform: scale(0.98); }

  /* Role toggle */
  .role-btn {
    flex: 1; padding: 11px 8px; border-radius: 12px;
    font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500;
    border: 1.5px solid #2A2A2A; color: #9A9A9A; background: transparent;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .role-btn.active { border-color: #FF6B00; color: #FF6B00; background: rgba(255,107,0,0.1); }
  .role-btn:hover:not(.active) { border-color: #3A3A3A; color: #F0F0F0; }

  /* Social login */
  .social-btn {
    flex: 1; padding: 11px 8px; border-radius: 12px;
    font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500;
    border: 1.5px solid #2A2A2A; color: #9A9A9A; background: #1C1C1C;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .social-btn:hover { border-color: #3A3A3A; color: #F0F0F0; }

  /* Password strength bar */
  .strength-bar { height: 3px; background: #2A2A2A; border-radius: 2px; overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; }

  /* Form panels */
  .form-panel { display: none; }
  .form-panel.active { display: block; }

  /* Checkbox */
  input[type="checkbox"] { accent-color: #FF6B00; width: 16px; height: 16px; cursor: pointer; }
</style>
</head>
<body class="bg-surface font-body" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px">

<div id="toast"></div>

<div style="width:100%;max-width:420px">

  <!-- Logo -->
  <div class="flex items-center gap-2.5 mb-8 justify-center">
    <div class="w-9 h-9 rounded-xl bg-brand flex items-center justify-center">
      <i class="fa fa-store text-white text-sm"></i>
    </div>
    <span class="font-display text-xl font-bold text-textPrimary">FoodTrippid <span class="text-brand">PH</span></span>
  </div>

  <!-- Welcome heading -->
  <div class="mb-6 text-center" id="form-heading">
    <h2 class="font-display font-bold text-2xl text-textPrimary">Welcome back!</h2>
    <p class="text-sm text-textSecondary mt-1">Sign in to find deals near you</p>
  </div>

  <!-- TAB SWITCHER -->
  <div class="flex gap-1.5 p-1.5 rounded-2xl mb-6" style="background:#1C1C1C;border:1px solid #2A2A2A">
    <button id="tab-login" class="tab-btn active" onclick="switchTab('login')">
      <i class="fa fa-right-to-bracket mr-1.5"></i>Log In
    </button>
    <button id="tab-signup" class="tab-btn" onclick="switchTab('signup')">
      <i class="fa fa-user-plus mr-1.5"></i>Sign Up
    </button>
  </div>

  <!-- ===== LOGIN FORM ===== -->
  <form id="form-login" class="form-panel active" onsubmit="handleLogin(event)">

    <!-- Email -->
    <div class="mb-3">
      <label class="text-xs text-textSecondary mb-1.5 block font-medium">Email Address</label>
      <div class="input-wrap">
        <i class="fa fa-envelope input-icon"></i>
        <input type="email" class="auth-input" placeholder="you@example.com" id="login-email" required autocomplete="email"/>
      </div>
    </div>

    <!-- Password -->
    <div class="mb-4">
      <div class="flex items-center justify-between mb-1.5">
        <label class="text-xs text-textSecondary font-medium">Password</label>
        <button type="button" class="text-xs text-brand hover:underline" onclick="showToast('<i class=\'fa fa-envelope mr-1\'></i> Password reset sent!')">
          Forgot password?
        </button>
      </div>
      <div class="input-wrap">
        <i class="fa fa-lock input-icon"></i>
        <input type="password" class="auth-input" placeholder="Enter your password" id="login-password" required autocomplete="current-password"/>
        <button type="button" class="input-eye" onclick="togglePwd('login-password', this)">
          <i class="fa fa-eye"></i>
        </button>
      </div>
    </div>

    <!-- Remember me -->
    <div class="flex items-center gap-2.5 mb-6">
      <input type="checkbox" id="remember-me" checked/>
      <label for="remember-me" class="text-sm text-textSecondary cursor-pointer select-none">Remember me on this device</label>
    </div>

    <!-- Login button -->
    <button type="submit" class="auth-btn mb-4">
      <i class="fa fa-right-to-bracket"></i>Log In
    </button>

    <!-- Divider -->
    <div class="flex items-center gap-3 mb-4">
      <div class="flex-1 h-px" style="background:#2A2A2A"></div>
      <span class="text-xs text-muted">or continue with</span>
      <div class="flex-1 h-px" style="background:#2A2A2A"></div>
    </div>

    <!-- Social buttons -->
    <div class="flex gap-2 mb-6">
      <button type="button" class="social-btn" onclick="showToast('<i class=\'fa fa-circle-info mr-1\'></i> Social login coming soon')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
      <button type="button" class="social-btn" onclick="showToast('<i class=\'fa fa-circle-info mr-1\'></i> Social login coming soon')">
        <i class="fa-brands fa-facebook text-blue-400"></i>Facebook
      </button>
    </div>

    <!-- Switch to signup -->
    <p class="text-center text-sm text-textSecondary">
      Don't have an account?
      <button type="button" class="text-brand font-medium hover:underline ml-1" onclick="switchTab('signup')">Sign up free</button>
    </p>

  </form>

  <!-- ===== SIGNUP FORM ===== -->
  <form id="form-signup" class="form-panel" onsubmit="handleSignup(event)">

    <!-- Full Name -->
    <div class="mb-3">
      <label class="text-xs text-textSecondary mb-1.5 block font-medium">Full Name</label>
      <div class="input-wrap">
        <i class="fa fa-user input-icon"></i>
        <input type="text" class="auth-input" placeholder="Juan dela Cruz" id="signup-name" required autocomplete="name"/>
      </div>
    </div>

    <!-- Email -->
    <div class="mb-3">
      <label class="text-xs text-textSecondary mb-1.5 block font-medium">Email Address</label>
      <div class="input-wrap">
        <i class="fa fa-envelope input-icon"></i>
        <input type="email" class="auth-input" placeholder="you@example.com" id="signup-email" required autocomplete="email"/>
      </div>
    </div>

    <!-- Password -->
    <div class="mb-3">
      <label class="text-xs text-textSecondary mb-1.5 block font-medium">Password</label>
      <div class="input-wrap">
        <i class="fa fa-lock input-icon"></i>
        <input type="password" class="auth-input" placeholder="At least 8 characters" id="signup-password" required
          oninput="checkStrength(this.value)" autocomplete="new-password"/>
        <button type="button" class="input-eye" onclick="togglePwd('signup-password', this)">
          <i class="fa fa-eye"></i>
        </button>
      </div>
      <div class="mt-2">
        <div class="strength-bar">
          <div class="strength-fill" id="strength-fill" style="width:0%"></div>
        </div>
        <p class="text-xs mt-1" id="strength-label" style="color:#5A5A5A">Enter a password</p>
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="mb-4">
      <label class="text-xs text-textSecondary mb-1.5 block font-medium">Confirm Password</label>
      <div class="input-wrap">
        <i class="fa fa-lock-open input-icon"></i>
        <input type="password" class="auth-input" placeholder="Re-enter your password" id="signup-confirm" required autocomplete="new-password"/>
      </div>
    </div>

    <!-- Account Role -->
    <div class="mb-4">
      <label class="text-xs text-textSecondary mb-2 block font-medium">
        <i class="fa fa-id-badge mr-1"></i>I want to join as
      </label>
      <div class="flex gap-2">
        <button type="button" id="role-buyer" class="role-btn active" onclick="selectRole('buyer')">
          <i class="fa fa-bag-shopping text-xs"></i>Buyer
        </button>
        <button type="button" id="role-seller" class="role-btn" onclick="selectRole('seller')">
          <i class="fa fa-store text-xs"></i>Seller
        </button>
        <button type="button" id="role-both" class="role-btn" onclick="selectRole('both')">
          <i class="fa fa-arrows-left-right text-xs"></i>Both
        </button>
      </div>
    </div>

    <!-- Location -->
    <div class="mb-4">
      <label class="text-xs text-textSecondary mb-1.5 block font-medium">Area in Manila</label>
      <div class="input-wrap">
        <i class="fa fa-location-dot input-icon"></i>
        <select class="auth-input" id="signup-location" required style="appearance:none;-webkit-appearance:none;cursor:pointer;">
          <option value="" disabled selected>Select your area in Manila</option>
          <option value="Binondo">Binondo</option>
          <option value="Ermita">Ermita</option>
          <option value="Intramuros">Intramuros</option>
          <option value="Malate">Malate</option>
          <option value="Paco">Paco</option>
          <option value="Pandacan">Pandacan</option>
          <option value="Port Area">Port Area</option>
          <option value="Quiapo">Quiapo</option>
          <option value="Sampaloc">Sampaloc</option>
          <option value="San Andres">San Andres</option>
          <option value="San Miguel">San Miguel</option>
          <option value="San Nicolas">San Nicolas</option>
          <option value="Santa Ana">Santa Ana</option>
          <option value="Santa Cruz">Santa Cruz</option>
          <option value="Santa Mesa">Santa Mesa</option>
          <option value="Tondo">Tondo</option>
        </select>
        <i class="fa fa-chevron-down" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#5A5A5A;font-size:12px;pointer-events:none;"></i>
      </div>
    </div>

    <!-- Seller name (conditional) -->
    <div class="mb-4 hidden" id="seller-name-wrap">
      <label class="text-xs text-textSecondary mb-1.5 block font-medium">Store / Business Name</label>
      <div class="input-wrap">
        <i class="fa fa-store input-icon"></i>
        <input type="text" class="auth-input" placeholder="e.g. Aling Rosa's Karinderya" id="signup-store"/>
      </div>
    </div>

    <!-- Terms -->
    <div class="flex items-start gap-2.5 mb-5">
      <input type="checkbox" id="agree-terms" required class="mt-0.5 flex-none"/>
      <label for="agree-terms" class="text-sm text-textSecondary cursor-pointer select-none leading-relaxed">
        I agree to the
        <button type="button" class="text-brand hover:underline">Terms of Service</button>
        and
        <button type="button" class="text-brand hover:underline">Privacy Policy</button>
      </label>
    </div>

    <!-- Signup button -->
    <button type="submit" class="auth-btn mb-4">
      <i class="fa fa-user-plus"></i>Create Account
    </button>

    <!-- Switch to login -->
    <p class="text-center text-sm text-textSecondary">
      Already have an account?
      <button type="button" class="text-brand font-medium hover:underline ml-1" onclick="switchTab('login')">Log in</button>
    </p>

  </form>

</div>

<script src="js/app.js"></script>
<script>
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-signup').classList.toggle('active', !isLogin);
  document.getElementById('form-login').classList.toggle('active', isLogin);
  document.getElementById('form-signup').classList.toggle('active', !isLogin);
  const heading = document.getElementById('form-heading');
  if (isLogin) {
    heading.querySelector('h2').textContent = 'Welcome back!';
    heading.querySelector('p').textContent = 'Sign in to find deals near you';
  } else {
    heading.querySelector('h2').textContent = 'Join FoodTrippid PH';
    heading.querySelector('p').textContent = 'Create your free account today';
  }
}

function togglePwd(inputId, btn) {
  const input = document.getElementById(inputId);
  const icon = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}

function checkStrength(val) {
  const fill = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    { pct: '0%',   color: '#2A2A2A', text: 'Enter a password',  textColor: '#5A5A5A' },
    { pct: '25%',  color: '#ef4444', text: 'Weak',              textColor: '#ef4444' },
    { pct: '50%',  color: '#f97316', text: 'Fair',              textColor: '#f97316' },
    { pct: '75%',  color: '#eab308', text: 'Good',              textColor: '#eab308' },
    { pct: '100%', color: '#22c55e', text: 'Strong',            textColor: '#22c55e' },
  ];
  const lv = val.length === 0 ? levels[0] : levels[score] || levels[score - 1];
  fill.style.width = lv.pct;
  fill.style.background = lv.color;
  label.textContent = lv.text;
  label.style.color = lv.textColor;
}

let selectedRole = 'buyer';
function selectRole(role) {
  selectedRole = role;
  ['buyer','seller','both'].forEach(r => {
    document.getElementById(`role-${r}`).classList.toggle('active', r === role);
  });
  document.getElementById('seller-name-wrap').classList.toggle('hidden', role === 'buyer');
}

function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) {
    showToast('<i class="fa fa-circle-exclamation mr-1"></i> Please fill in all fields');
    return;
  }
  const btn = e.target.querySelector('.auth-btn');
  btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-1"></i>Logging in…';
  btn.disabled = true;
  setTimeout(() => {
    showToast('<i class="fa fa-circle-check mr-1"></i> Login successful! Welcome back.');
    setTimeout(() => { location.href = 'index.html'; }, 800);
  }, 1200);
}

function handleSignup(e) {
  e.preventDefault();
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-confirm').value;
  const agreed = document.getElementById('agree-terms').checked;
  if (!name || !email || !password) {
    showToast('<i class="fa fa-circle-exclamation mr-1"></i> Please fill in all required fields');
    return;
  }
  if (password !== confirm) {
    showToast('<i class="fa fa-circle-exclamation mr-1"></i> Passwords do not match');
    return;
  }
  if (password.length < 8) {
    showToast('<i class="fa fa-circle-exclamation mr-1"></i> Password must be at least 8 characters');
    return;
  }
  if (!agreed) {
    showToast('<i class="fa fa-circle-exclamation mr-1"></i> Please agree to the Terms of Service');
    return;
  }
  const btn = e.target.querySelector('.auth-btn');
  btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-1"></i>Creating account…';
  btn.disabled = true;
  setTimeout(() => {
    showToast(`<i class="fa fa-circle-check mr-1"></i> Welcome, ${name.split(' ')[0]}! Account created.`);
    setTimeout(() => { location.href = 'index.html'; }, 900);
  }, 1400);
}

document.getElementById('login-email').addEventListener('focus', function() {
  if (!this.value) this.value = 'demo@foodtripid.ph';
});
document.getElementById('login-password').addEventListener('focus', function() {
  if (!this.value) this.value = 'demo1234';
});
</script>
</body>
</html>
